<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sibi's Career Roadmap</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Geist+Mono:wght@100..900&family=Switzer:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1C1B1A",
                        background: "#F4F3EF",
                        surface: "#FFFFFF",
                        text: "#2D2C2A",
                        muted: "#9E9C98",
                        accent: "#DA4126",
                    },
                    fontFamily: {
                        heading: ['Fraunces', 'serif'],
                        body: ['Switzer', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    },
                    borderRadius: {
                        DEFAULT: "0px",
                        none: "0px",
                        sm: "0px",
                        md: "0px",
                        lg: "0px",
                        xl: "0px",
                        "2xl": "0px",
                        "3xl": "0px",
                        full: "0px",
                    },
                    boxShadow: {
                        brutal: "4px 4px 0px 0px var(--tw-shadow-color)",
                        "brutal-hover": "6px 6px 0px 0px var(--tw-shadow-color)",
                    },
                    transitionProperty: {
                        'shadow-transform': 'box-shadow, transform',
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.text');
            font-family: theme('fontFamily.body');
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .shadow-color-primary {
            --tw-shadow-color: theme('colors.primary');
        }

        /* Custom Scrollbar for columns */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: theme('colors.background');
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: theme('colors.muted');
            border: 1px solid theme('colors.primary');
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: theme('colors.primary');
        }
    </style>
</head>
<body class="flex min-h-screen overflow-hidden">
    <!-- Root container for React app -->
    <div id="root" class="flex w-full h-screen"></div>

    <script type="text/babel">
        const { useState } = React;

        const tracks = [
            {
                id: 'ai-product',
                icon: 'robot_2',
                title: 'AI Product / AI Specialist',
                description: 'Specialized PM track focused on LLM-powered features, AI workflows, evals, and agentic systems. Demand currently outstrips supply, and non-traditional backgrounds are still being hired here.',
                timeline: [
                    {
                        period: 'Weeks 1–2',
                        title: 'Foundation & Tooling',
                        content: 'Anthropic + OpenAI API docs cover-to-cover. Build a working AI tool (anything — a doc summarizer, a meeting-notes-to-tasks converter, a code-review assistant). Ship it publicly.',
                        tags: ['APIs', 'LLMs', 'Building']
                    },
                    {
                        period: 'Weeks 3–6',
                        title: 'Theory & Perspectives',
                        content: 'Read Lenny Rachitsky\'s AI-PM archive, Aakash Gupta\'s PM articles, watch every Latent Space podcast episode. Write 2 LinkedIn posts on AI product decisions.',
                        tags: ['Product Sense', 'Writing']
                    },
                    {
                        period: 'Weeks 7–10',
                        title: 'Advanced Project',
                        content: 'Build a second, more sophisticated AI project — ideally with evals, multi-step agents, or a real customer. Publish a write-up of what you learned.',
                        tags: ['Agents', 'Evals', 'Shipping']
                    },
                    {
                        period: 'Weeks 11–13',
                        title: 'Apply & Interview',
                        content: 'Apply. By this point you have: 2 shipped projects, 8+ thoughtful LinkedIn posts, an articulated point of view on AI product. You\'re applying as a credible AI-product candidate.',
                        tags: ['Applications', 'Interviews']
                    }
                ]
            },
            {
                id: 'product-analyst',
                icon: 'analytics',
                title: 'Product Analyst → PM',
                description: 'SQL + a BI tool + product sense. Less glamorous than PM, but conversion to PM after 1–2 years is high. Lowest runway risk on this list.',
                timeline: [
                    {
                        period: 'Weeks 1–4',
                        title: 'SQL Mastery',
                        content: 'Master SQL. SQLZoo, Mode SQL Tutorial, then a dataset (Kaggle). Aim for "I can pull and analyze my own data without help."',
                        tags: ['SQL', 'Data', 'Kaggle']
                    },
                    {
                        period: 'Weeks 5–8',
                        title: 'BI & Dashboards',
                        content: 'Pick one BI tool (Metabase, Looker Studio, or Tableau Public). Build 3 dashboards on real-ish data. Publish them.',
                        tags: ['Metabase', 'Tableau', 'Visualization']
                    },
                    {
                        period: 'Weeks 9–11',
                        title: 'Experimentation Frameworks',
                        content: 'Read Trustworthy Online Controlled Experiments (Kohavi), study Amplitude\'s product analytics resources, learn one A/B testing framework deeply.',
                        tags: ['A/B Testing', 'Analytics']
                    },
                    {
                        period: 'Weeks 12–13',
                        title: 'Apply & Interview',
                        content: 'Apply. Resume now reads "ex-Rocketlane Support Specialist with X portfolio of analyses." That\'s a strong product-analyst story.',
                        tags: ['Applications', 'Interviews']
                    }
                ]
            },
            {
                id: 'product-engineer',
                icon: 'code_blocks',
                title: 'Product Engineer',
                description: 'The hardest, highest-payoff track. Product engineer is the new label for engineers who think in product, ship fast, and own outcomes.',
                timeline: [
                    {
                        period: 'Weeks 1–4',
                        title: 'Frontend Ramp',
                        content: 'Modern frontend ramp — React, TypeScript, Tailwind, Next.js. Use Frontend Masters or full-stack-open.com.',
                        tags: ['React', 'TypeScript', 'Tailwind']
                    },
                    {
                        period: 'Weeks 5–8',
                        title: 'Portfolio Project V1',
                        content: 'Build the cafe billing system as a polished, deployed, public Next.js app. Real database (Supabase or Neon), real auth, real payment flow, real customer.',
                        tags: ['Next.js', 'Supabase', 'Shipping']
                    },
                    {
                        period: 'Weeks 9–11',
                        title: 'Breadth & Complexity',
                        content: 'Build a second project — something API-heavy or AI-augmented. The point is breadth + a public GitHub with shipped, working code.',
                        tags: ['APIs', 'AI', 'GitHub']
                    },
                    {
                        period: 'Weeks 12–13',
                        title: 'Apply & Interview',
                        content: 'Apply. Your portfolio is now your strongest asset.',
                        tags: ['Applications', 'Interviews']
                    }
                ]
            },
            {
                id: 'devrel',
                icon: 'campaign',
                title: 'Developer Relations',
                description: 'Influence product through content, sample apps, docs, and community. Developer-facing through code and content.',
                timeline: [
                    {
                        period: 'Weeks 1–4',
                        title: 'Tool Specialty',
                        content: 'Pick one developer tool (Postman, Hasura, Resend, etc.) — your "specialty." Build a sample app with it. Write a tutorial.',
                        tags: ['Sample Apps', 'Writing', 'DevTools']
                    },
                    {
                        period: 'Weeks 5–8',
                        title: 'Content & Open Source',
                        content: 'Two more tutorials, one open-source contribution (even a docs PR), start a personal technical blog.',
                        tags: ['OSS', 'Blogging', 'Community']
                    },
                    {
                        period: 'Weeks 9–11',
                        title: 'Networking & Chats',
                        content: 'Talk to existing DevRel people via LinkedIn — ask for 15-minute chats. Five conversations will teach you more than a month of reading.',
                        tags: ['Networking', 'Interviews']
                    },
                    {
                        period: 'Weeks 12–13',
                        title: 'Apply & Interview',
                        content: 'Apply, with referrals from those five conversations.',
                        tags: ['Applications', 'Referrals']
                    }
                ]
            }
        ];

        const ExploreRoles = () => {
            const roles = [
                { cat: 'Product', title: 'Product Specialist', tier: 'Tier 1', desc: 'Owns product workflows, customer feedback synthesis, and cross-functional coordination.', salary: '₹8–14 LPA', prep: '4–8 weeks', targets: 'Freshworks, Zoho, Chargebee, Postman, Atlan' },
                { cat: 'Product', title: 'Product Operations', tier: 'Tier 1', desc: 'The "make the product team work better" role. Tools, processes, feedback systems, metrics infrastructure.', salary: '₹10–16 LPA', prep: '2–3 months', targets: 'Razorpay, CRED, Postman, Atlassian, Atlan' },
                { cat: 'Product', title: 'Associate Product Manager', tier: 'Tier 2', desc: 'Structured rotational programs designed for non-traditional backgrounds.', salary: '₹15–25 LPA', prep: '3–6 months', targets: 'Google, Atlassian, Microsoft, Razorpay, Atlan' },
                { cat: 'Product', title: 'AI Product Manager', tier: 'Tier 2', desc: 'Focused on LLM-powered features, evals, and agentic systems.', salary: '₹19–37 LPA', prep: '3–4 months', targets: 'Atlan, Glean, Sarvam AI, Krutrim' },
                { cat: 'Product', title: 'Product Marketing Manager', tier: 'Tier 2', desc: 'Owns positioning, launches, competitive intel, customer narratives.', salary: '₹10–18 LPA', prep: '3–4 months', targets: 'Postman, Freshworks, Chargebee, Zoho' },
                { cat: 'Technical', title: 'Product Engineer', tier: 'Tier 3', desc: 'Engineers who think in product, ship fast, and own outcomes.', salary: '₹15–35 LPA', prep: '6–9 months', targets: 'Linear, Vercel, Razorpay, Zerodha' },
                { cat: 'Technical', title: 'Design Engineer', tier: 'Tier 2/3', desc: 'Sits between design and frontend code. High design bar.', salary: '₹12–28 LPA', prep: '5–7 months', targets: 'Razorpay, CRED, Postman, HackerRank' },
            ];

            return (
                <div className="flex-1 flex flex-col h-full bg-background overflow-hidden">
                    <header className="h-auto md:h-16 border-b border-primary bg-surface shrink-0 flex items-center p-4 md:px-6 z-10 sticky top-0">
                        <h1 className="text-3xl font-heading font-bold tracking-tight text-primary">Explore Roles</h1>
                    </header>
                    <main className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar flex flex-col gap-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            {roles.map(r => (
                                <article key={r.title} className="bg-surface border border-primary p-6 shadow-brutal shadow-color-primary flex flex-col gap-4 group hover:-translate-y-1 transition-transform">
                                    <div className="flex justify-between items-start">
                                        <span className="font-mono text-[10px] uppercase tracking-widest text-accent bg-accent/10 px-2 py-1 border border-accent/30">{r.cat}</span>
                                        <span className="font-mono text-[10px] uppercase tracking-widest text-muted">{r.tier}</span>
                                    </div>
                                    <h3 className="font-heading text-xl font-bold text-primary leading-tight">{r.title}</h3>
                                    <p className="font-body text-sm text-text leading-relaxed">{r.desc}</p>
                                    <div className="mt-auto pt-4 flex flex-col gap-2 border-t border-primary/20 font-mono text-[11px]">
                                        <div className="flex justify-between"><span className="text-muted uppercase">Salary</span><span className="font-bold text-primary">{r.salary}</span></div>
                                        <div className="flex justify-between"><span className="text-muted uppercase">Prep Time</span><span className="font-bold text-primary">{r.prep}</span></div>
                                        <div className="flex flex-col mt-2 pt-2 border-t border-primary/10 gap-1">
                                            <span className="text-muted uppercase">Target Companies</span>
                                            <span className="text-primary truncate">{r.targets}</span>
                                        </div>
                                    </div>
                                </article>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const RealityCheck = () => {
            return (
                <div className="flex-1 flex flex-col h-full bg-background overflow-hidden">
                    <header className="h-auto md:h-16 border-b border-primary bg-surface shrink-0 flex items-center p-4 md:px-6 z-10 sticky top-0">
                        <h1 className="text-3xl font-heading font-bold tracking-tight text-primary flex items-center gap-3">
                            <span className="material-symbols-outlined text-[32px] text-accent">warning</span>
                            Reality Check
                        </h1>
                    </header>
                    <main className="flex-1 overflow-y-auto p-6 md:p-12 custom-scrollbar bg-primary text-surface">
                        <div className="max-w-3xl mx-auto flex flex-col gap-12 py-8">
                            
                            <section className="border-l-4 border-accent pl-6">
                                <h2 className="font-heading text-3xl font-bold mb-4 uppercase tracking-tight text-surface">On "Managerial"</h2>
                                <p className="font-body text-lg leading-relaxed text-surface/90">
                                    The "managerial" label can mean very different things. Most roles on this list are individual contributor (IC) roles with cross-functional ownership. Genuine people-management roles in tech almost always require 4+ years of IC experience first. Your "ownership and leading initiatives" instinct is what hiring managers in IC product roles want; explicit people-management is a 3+ year goal.
                                </p>
                            </section>

                            <section className="border-l-4 border-accent pl-6">
                                <h2 className="font-heading text-3xl font-bold mb-4 uppercase tracking-tight text-surface">On "Less Customer-Facing"</h2>
                                <p className="font-body text-lg leading-relaxed text-surface/90">
                                    A few of the roles (Product Specialist, DevRel) still involve some user interaction — but the relationship is different from support. You're shaping the product they use, not unblocking their tickets. If "no customer interaction at all" is a hard constraint, prioritize: Product Analyst, Product Engineer, AI Engineer, Technical Writer. These are genuinely behind-the-scenes.
                                </p>
                            </section>

                            <section className="border-l-4 border-accent pl-6">
                                <h2 className="font-heading text-3xl font-bold mb-4 uppercase tracking-tight text-surface">On AI-Related FOMO</h2>
                                <p className="font-body text-lg leading-relaxed text-surface/90">
                                    AI roles pay well right now and the field is genuinely exciting. But picking AI because it's hot, when your underlying interest is in building products generally, is a recipe for two years of feeling lost. The right framing is: AI as the layer you operate within, while doing whatever core craft (product, design, analytics, engineering) actually pulls you. That layered framing ages well; chasing the buzzword does not.
                                </p>
                            </section>
                            
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => {
            const [activeView, setActiveView] = useState('journey'); // Default to Path Explorer for testing
            const [activeTrackId, setActiveTrackId] = useState(tracks[0].id);
            const activeTrack = tracks.find(t => t.id === activeTrackId);
            const [isChecklistOpen, setIsChecklistOpen] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            return (
                <div className="flex flex-col md:flex-row w-full h-full overflow-hidden">
                    {/* Mobile Header */}
                    <div className="md:hidden flex items-center justify-between p-4 bg-surface border-b border-primary z-20 shrink-0">
                        <h1 className="text-primary font-heading text-xl font-semibold">Sibi's Roadmap</h1>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 border border-transparent hover:border-primary transition-colors flex">
                            <span className="material-symbols-outlined">{isMobileMenuOpen ? 'close' : 'menu'}</span>
                        </button>
                    </div>

                    <div className={`fixed inset-y-0 left-0 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition duration-200 ease-in-out z-30 md:z-auto bg-background md:bg-transparent h-full shadow-2xl md:shadow-none w-64 shrink-0`}>
                        <Sidebar 
                            activeView={activeView}
                            setActiveView={(view) => { setActiveView(view); setIsMobileMenuOpen(false); }}
                            activeTrackId={activeTrackId} 
                            setActiveTrackId={(id) => { setActiveTrackId(id); setIsMobileMenuOpen(false); }} 
                            setIsChecklistOpen={setIsChecklistOpen}
                        />
                    </div>
                    {isMobileMenuOpen && <div className="fixed inset-0 bg-primary/40 z-20 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    {activeView === 'journey' && (
                        <main className="flex-1 flex flex-col md:flex-row overflow-hidden md:overflow-hidden h-full overflow-y-auto md:overflow-y-visible">
                            <Intro track={activeTrack} />
                            <Timeline track={activeTrack} />
                        </main>
                    )}
                    {activeView === 'app_hub' && <ApplicationHub />}
                    {activeView === 'path_explorer' && <PathExplorer setActiveView={(view) => { setActiveView(view); setIsMobileMenuOpen(false); }} setActiveTrackId={(id) => { setActiveTrackId(id); setIsMobileMenuOpen(false); }} />}
                    {activeView === 'explore' && <ExploreRoles />}
                    {activeView === 'reality_check' && <RealityCheck />}
                    {isChecklistOpen && <ChecklistModal onClose={() => setIsChecklistOpen(false)} />}
                </div>
            );
        };

        const Sidebar = ({ activeView, setActiveView, activeTrackId, setActiveTrackId, setIsChecklistOpen }) => {
            return (
                <div className="relative flex h-full w-64 flex-col bg-background border-r border-primary shrink-0 font-body overflow-y-auto custom-scrollbar">
                    <div className="flex h-full grow flex-col">
                        <div className="flex flex-1 justify-center py-5">
                            <div className="flex flex-col max-w-[960px] flex-1">
                                <div className="flex h-full flex-col justify-between p-4 min-h-[600px]">
                                    <div className="flex flex-col gap-8">
                                        <div className="flex flex-col gap-1">
                                            <h1 className="text-primary font-heading text-2xl font-semibold leading-normal tracking-[-0.02em]">Sibi's Roadmap</h1>
                                            <p className="text-muted font-mono text-[13px] uppercase tracking-[0.05em] font-medium leading-normal">AI Companion</p>
                                        </div>
                                        
                                        <div className="flex flex-col gap-2">
                                            <button onClick={() => setActiveView('journey')} className={`flex items-center gap-3 px-3 py-2 text-left transition-colors border ${activeView === 'journey' ? 'bg-primary text-surface border-primary' : 'text-text border-transparent hover:border-primary'}`}>
                                                <span className="material-symbols-outlined text-[20px]" style={activeView === 'journey' ? {fontVariationSettings: "'FILL' 1"} : {}}>map</span>
                                                <span className="font-mono text-sm font-medium leading-normal tracking-tight">The Journey</span>
                                            </button>
                                            
                                            {activeView === 'journey' && (
                                                <div className="flex flex-col gap-1 ml-6 mt-1 mb-2 border-l border-primary pl-2">
                                                    {tracks.map(track => (
                                                        <button 
                                                            key={track.id}
                                                            onClick={() => setActiveTrackId(track.id)}
                                                            className={`text-left font-mono text-xs py-1.5 px-2 transition-colors ${activeTrackId === track.id ? 'text-accent font-bold' : 'text-text hover:text-accent'}`}
                                                        >
                                                            {track.title}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}

                                            <button onClick={() => setActiveView('app_hub')} className={`flex items-center gap-3 px-3 py-2 text-left transition-colors border ${activeView === 'app_hub' ? 'bg-primary text-surface border-primary' : 'text-text border-transparent hover:border-primary'}`}>
                                                <span className="material-symbols-outlined text-[20px]" style={activeView === 'app_hub' ? {fontVariationSettings: "'FILL' 1"} : {}}>work</span>
                                                <span className="font-mono text-sm font-medium leading-normal tracking-tight">Application Hub</span>
                                            </button>
                                            
                                            <button onClick={() => setActiveView('path_explorer')} className={`flex items-center gap-3 px-3 py-2 text-left transition-colors border ${activeView === 'path_explorer' ? 'bg-primary text-surface border-primary' : 'text-text border-transparent hover:border-primary'}`}>
                                                <span className="material-symbols-outlined text-[20px]" style={activeView === 'path_explorer' ? {fontVariationSettings: "'FILL' 1"} : {}}>explore</span>
                                                <span className="font-mono text-sm font-medium leading-normal tracking-tight">Path Explorer</span>
                                            </button>
                                            <button onClick={() => setActiveView('explore')} className={`flex items-center gap-3 px-3 py-2 text-left transition-colors border ${activeView === 'explore' ? 'bg-primary text-surface border-primary' : 'text-text border-transparent hover:border-primary'}`}>
                                                <span className="material-symbols-outlined text-[20px]" style={activeView === 'explore' ? {fontVariationSettings: "'FILL' 1"} : {}}>travel_explore</span>
                                                <span className="font-mono text-sm font-medium leading-normal tracking-tight">Explore Roles</span>
                                            </button>
                                            
                                            <button onClick={() => setActiveView('reality_check')} className={`flex items-center gap-3 px-3 py-2 text-left transition-colors border ${activeView === 'reality_check' ? 'bg-primary text-surface border-primary' : 'text-text border-transparent hover:border-primary'}`}>
                                                <span className="material-symbols-outlined text-[20px]" style={activeView === 'reality_check' ? {fontVariationSettings: "'FILL' 1"} : {}}>warning</span>
                                                <span className="font-mono text-sm font-medium leading-normal tracking-tight">Reality Check</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-4 border-t border-primary pt-6 mt-6">
                                        <button onClick={() => setIsChecklistOpen(true)} className="flex items-center gap-3 px-3 py-2 text-left text-text border border-transparent hover:border-primary transition-colors">
                                            <span className="material-symbols-outlined text-[20px]">checklist</span>
                                            <span className="font-mono text-sm font-medium leading-normal tracking-tight">Pre-flight Checklist</span>
                                        </button>
                                        <a href="https://www.linkedin.com/in/sibi-ranganathan-2165a5140" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 px-3 py-2 text-text border border-transparent hover:border-primary transition-colors">
                                            <span className="material-symbols-outlined text-[20px]">mail</span>
                                            <span className="font-mono text-sm font-medium leading-normal tracking-tight">Reach Out</span>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ChecklistModal = ({ onClose }) => {
            const initialTasks = [
                { id: 1, text: 'Update resume with outcomes over output', done: false },
                { id: 2, text: 'Turn on "Open to Work" on LinkedIn', done: false },
                { id: 3, text: 'Deploy at least 1 project publicly', done: false },
                { id: 4, text: 'Clean up GitHub repositories', done: false },
                { id: 5, text: 'Draft "Tell me about yourself" pitch', done: false }
            ];
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('sibi_checklist');
                return saved ? JSON.parse(saved) : initialTasks;
            });

            const toggleTask = (id) => {
                const newTasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
                setTasks(newTasks);
                localStorage.setItem('sibi_checklist', JSON.stringify(newTasks));
            };

            const progress = Math.round((tasks.filter(t => t.done).length / tasks.length) * 100);

            return (
                <div className="fixed inset-0 bg-primary/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-surface border border-primary shadow-brutal shadow-color-primary p-8 w-full max-w-lg flex flex-col">
                        <div className="flex justify-between items-start mb-6">
                            <h2 className="text-2xl font-heading font-bold text-primary">Pre-flight Checklist</h2>
                            <button onClick={onClose} className="hover:bg-background p-1 border border-transparent hover:border-primary transition-colors">
                                <span className="material-symbols-outlined text-[20px]">close</span>
                            </button>
                        </div>
                        
                        <div className="mb-6">
                            <div className="flex justify-between items-end mb-2">
                                <span className="font-mono text-xs uppercase tracking-widest text-muted">Launch Readiness</span>
                                <span className="font-mono text-sm font-bold text-accent">{progress}%</span>
                            </div>
                            <div className="h-2 w-full bg-background border border-primary">
                                <div className="h-full bg-accent transition-all duration-500" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                'AI Product Manager': { desc: 'Leads development of LLM-powered features. Highly technical and experimental.', day: 'Running evals, reading API docs, testing prompts, aligning engineering with customer needs.', comp: '$140k - $220k', tech: 'OpenAI API, Python, LLM Evals', trackId: 'ai-product' },
                'Product Engineer': { desc: 'Full-stack engineer who owns the entire feature lifecycle from design to deployment.', day: 'Writing React components, designing DB schemas, reviewing analytics, shipping code.', comp: '$130k - $200k', tech: 'React, Next.js, Tailwind, TypeScript', trackId: 'product-engineer' },
                'Design Engineer': { desc: 'Hybrid role connecting design systems with frontend implementation. Obsessed with UX polish.', day: 'Prototyping in code, building component libraries, animating interfaces.', comp: '$120k - $180k', tech: 'React, CSS/Tailwind, Framer Motion, Figma', trackId: 'product-engineer' },
                'Prompt Engineer': { desc: 'Focuses on designing and optimizing LLM prompts to produce reliable outputs.', day: 'Testing system prompts, evaluating hallucination rates, building test sets.', comp: '$100k - $160k', tech: 'OpenAI API, Anthropic Console, Python', trackId: 'ai-product' },
                'Product Analyst': { desc: 'Uses data to uncover insights about user behavior and product usage.', day: 'Writing complex SQL queries, building dashboards, designing A/B tests.', comp: '$90k - $140k', tech: 'SQL, Python, Looker, Tableau', trackId: 'product-analyst' },
                'Developer Advocate': { desc: 'Influence product through content, sample apps, docs, and community.', day: 'Building sample apps, writing tutorials, speaking at conferences.', comp: '$110k - $180k', tech: 'Varies by tool, Blogging, OSS', trackId: 'devrel' },
                'Tech Writer': { desc: 'Creates clear, concise documentation for technical products and APIs.', day: 'Testing APIs, writing guides, interviewing engineers.', comp: '$90k - $130k', tech: 'Markdown, Git, Postman, Readme', trackId: 'devrel' }
            };

            const idealProfiles = {
                product: { tech: 4, prod: 9, comm: 9, auto: 7, data: 6, design: 6 },
                tech: { tech: 9, prod: 6, comm: 4, auto: 8, data: 6, design: 5 },
                data: { tech: 6, prod: 5, comm: 6, auto: 7, data: 9, design: 4 }
            };

            const getGapStr = (user, ideal) => {
                let gaps = [];
                if (ideal.tech - user.tech > 2) gaps.push('+Tech');
                if (ideal.prod - user.prod > 2) gaps.push('+Prod');
                if (ideal.comm - user.comm > 2) gaps.push('+Comm');
                if (ideal.data - user.data > 2) gaps.push('+Data');
                if (gaps.length === 0) return 'Ready to transition!';
                return `Gap: ${gaps.join(', ')}`;
            };

            const pathColumns = [
                {
                    id: 'product',
                    title: 'Product Roles',
                    ideal: idealProfiles.product,
                    roles: ['Product Specialist', 'Associate Product Manager', 'AI Product Manager'],
                    cons: ['High cross-functional load'],
                    exploreTitle: 'Explore Product',
                    exploreTrackId: 'product-analyst' 
                },
                {
                    id: 'tech',
                    title: 'Technical & AI',
                    ideal: idealProfiles.tech,
                    roles: ['Product Engineer', 'Design Engineer', 'Prompt Engineer'],
                    cons: ['High technical barrier'],
                    exploreTitle: 'Explore Technical',
                    exploreTrackId: 'product-engineer'
                },
                {
                    id: 'data',
                    title: 'Data & DevRel',
                    ideal: idealProfiles.data,
                    roles: ['Product Analyst', 'Developer Advocate', 'Tech Writer'],
                    cons: ['High public visibility'],
                    exploreTitle: 'Explore Data & DevRel',
                    exploreTrackId: 'devrel' 
                }
            ];

            return (
                <div className="flex-1 flex flex-col overflow-hidden bg-background">
                    <header className="border-b border-primary bg-surface shrink-0 flex flex-col px-8 py-5 z-10 sticky top-0 gap-5">
                        <div className="flex items-center justify-between">
                            <h1 className="text-3xl font-heading font-bold tracking-tight text-primary">Path Explorer</h1>
                            <button onClick={() => { setQuizActive(true); setQuizStep(0); setQuizScores({product:0, tech:0, data:0}); }} className="bg-primary text-surface px-4 py-2 font-mono text-sm shadow-brutal hover:shadow-[6px_6px_0px_0px_var(--tw-shadow-color)] hover:-translate-y-0.5 transition-all shadow-color-primary flex items-center gap-2">
                                <span className="material-symbols-outlined text-[18px]">psychology_alt</span>
                                Match Me Quiz
                            </button>
                        </div>
                        
                        <div className="flex items-center gap-6 border-t border-primary/20 pt-4">
                            <div className="flex items-center gap-3">
                                <span className="font-mono text-xs uppercase text-muted font-bold tracking-wider">Current Role:</span>
                                <select value={currentRole} onChange={handleRoleChange} className="border border-primary bg-background px-3 py-1.5 font-mono text-sm focus:outline-none">
                                    {Object.keys(currentRolesProfiles).map(r => <option key={r} value={r}>{r}</option>)}
                                    <option value="Custom">Custom / Quiz Result</option>
                                </select>
                            </div>
                            {currentRole === 'Custom' || currentRole === 'Quiz Result' || currentRole !== 'None' ? (
                                <div className="flex gap-4 flex-1 items-center justify-end font-mono text-xs">
                                    {['tech', 'prod', 'comm', 'auto', 'data', 'design'].map(sk => (
                                        <div key={sk} className="flex flex-col gap-1 items-center w-16">
                                            <label className="uppercase text-muted text-[10px]">{sk}</label>
                                            <input type="range" min="0" max="10" value={userSkills[sk]} onChange={(e) => handleSkillChange(sk, e.target.value)} className="w-full accent-primary" />
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="flex-1 text-right font-mono text-xs text-muted pt-1">
                                    Select a role to see the skill gap analysis in the columns below.
                                </div>
                            )}
                        </div>
                    </header>

                    {quizActive && (
                        <div className="fixed inset-0 bg-primary/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-surface border border-primary shadow-brutal shadow-color-primary p-8 w-full max-w-lg">
                                <div className="flex justify-between items-start mb-6">
                                    <h2 className="text-2xl font-heading font-bold text-primary">Match Me Assessment</h2>
                                    <span className="font-mono text-sm text-muted">Step {quizStep + 1} / {questions.length}</span>
                                </div>
                                <p className="font-body text-lg mb-8">{questions[quizStep].q}</p>
                                <div className="flex flex-col gap-3">
                                    {questions[quizStep].opts.map((opt, i) => (
                                        <button key={i} onClick={() => answerQuiz(opt.profile)} className="text-left font-body p-4 border border-primary hover:bg-background transition-colors flex items-center justify-between group">
                                            <span>{opt.text}</span>
                                            <span className="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-8 flex justify-center">
                                     <button onClick={() => setQuizActive(false)} className="text-xs font-mono uppercase text-muted hover:text-primary transition-colors">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <main className="flex-1 flex flex-col md:flex-row overflow-y-auto custom-scrollbar">
                        {pathColumns.map(col => {
                            const isDimmed = quizResult && quizResult !== col.id;
                            return (
                                <section key={col.id} className={`w-full md:flex-1 flex flex-col h-auto md:h-full border-b md:border-b-0 md:border-r border-primary pt-10 pb-12 px-8 xl:px-12 relative group transition-all duration-300 hover:bg-surface ${isDimmed ? 'opacity-30 grayscale hover:opacity-100 hover:grayscale-0' : 'opacity-100'}`}>
                                    <div className="flex-grow flex flex-col items-center relative z-10">
                                        <h2 className="text-[28px] font-heading font-semibold mb-8 text-center text-primary">{col.title}</h2>
                                        
                                        <div className="w-full max-w-[280px] mb-8">
                                            <ul className="space-y-3 font-mono text-[13px] text-text">
                                                {col.roles.map(r => (
                                                    <li key={r} onClick={() => setSelectedRole(r)} className="flex items-start gap-3 cursor-pointer group/role hover:text-accent transition-colors">
                                                        <span className="material-symbols-outlined text-accent text-lg">arrow_forward</span>
                                                        <span className="leading-relaxed border-b border-transparent group-hover/role:border-accent">{r}</span>
                                                    </li>
                                                ))}
                                                {col.cons.map(c => (
                                                    <li key={c} className="flex items-start gap-3 text-muted mt-4 pt-4 border-t border-primary/10">
                                                        <span className="material-symbols-outlined text-lg">close</span>
                                                        <span className="leading-relaxed">{c}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                        
                                        <div className="w-full max-w-[200px] aspect-square relative mt-auto flex flex-col items-center justify-center">
                                            <RadarChart idealSkills={col.ideal} userSkills={userSkills} />
                                            <div className="absolute -bottom-8 font-mono text-[10px] text-accent uppercase font-bold tracking-widest text-center w-full">
                                                {currentRole !== 'None' ? getGapStr(userSkills, col.ideal) : 'Skill Profile'}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="w-full flex justify-center mt-12 relative z-10">
                                        <button 
                                            onClick={() => { setActiveTrackId(col.exploreTrackId); setActiveView('journey'); }}
                                            className="w-full max-w-[280px] py-4 px-6 border border-primary bg-transparent text-primary font-mono text-[14px] uppercase tracking-wider transition-colors duration-200 hover:bg-primary hover:text-surface"
                                        >
                                            {col.exploreTitle}
                                        </button>
                                    </div>
                                </section>
                            );
                        })}
                    </main>

                    {/* Side Drawer for Role Details */}
                    <div className={`fixed inset-0 bg-primary/40 backdrop-blur-sm z-40 transition-opacity duration-300 ${selectedRole ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`} onClick={() => setSelectedRole(null)}></div>
                    <div className={`fixed top-0 right-0 h-full w-full max-w-[480px] bg-background border-l border-primary z-50 transform transition-transform duration-300 shadow-brutal shadow-color-primary flex flex-col ${selectedRole ? 'translate-x-0' : 'translate-x-full'}`}>
                        {selectedRole && roleDetails[selectedRole] ? (
                            <>
                                <div className="h-20 border-b border-primary flex items-center justify-between px-8 bg-surface shrink-0">
                                    <h2 className="text-2xl font-heading font-bold text-primary">{selectedRole}</h2>
                                    <button onClick={() => setSelectedRole(null)} className="w-8 h-8 flex items-center justify-center hover:bg-background border border-transparent hover:border-primary transition-colors">
                                        <span className="material-symbols-outlined">close</span>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 flex flex-col gap-8 custom-scrollbar">
                                    <section className="bg-surface border border-primary p-6 shadow-brutal shadow-color-primary">
                                        <h3 className="font-mono text-sm uppercase tracking-widest text-muted mb-4">Overview</h3>
                                        <p className="font-body text-base leading-relaxed">{roleDetails[selectedRole].desc}</p>
                                    </section>
                                    <section className="bg-surface border border-primary p-6 shadow-brutal shadow-color-primary">
                                        <h3 className="font-mono text-sm uppercase tracking-widest text-muted mb-4">Day to Day</h3>
                                        <p className="font-body text-base leading-relaxed">{roleDetails[selectedRole].day}</p>
                                    </section>
                                    <section className="bg-surface border border-primary p-6 shadow-brutal shadow-color-primary">
                                        <h3 className="font-mono text-sm uppercase tracking-widest text-muted mb-4">Key Tools / Tech</h3>
                                        <div className="font-mono text-sm text-primary p-3 bg-background border border-primary/20">
                                            {roleDetails[selectedRole].tech}
                                        </div>
                                    </section>
                                    <section className="flex items-center justify-between p-6 border-t border-primary/20 mt-auto">
                                        <div>
                                            <h3 className="font-mono text-xs uppercase tracking-widest text-muted mb-1">Target Comp</h3>
                                            <div className="font-mono text-base font-bold text-accent">{roleDetails[selectedRole].comp}</div>
                                        </div>
                                        <button onClick={() => { setActiveTrackId(roleDetails[selectedRole].trackId); setActiveView('journey'); setSelectedRole(null); }} className="px-6 py-3 bg-primary text-surface font-mono text-sm shadow-brutal shadow-color-primary hover:-translate-y-0.5 transition-transform">
                                            Start Track
                                        </button>
                                    </section>
                                </div>
                            </>
                        ) : (
                            <div className="p-8"><p className="font-mono text-sm">Role details not found.</p></div>
                        )}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
